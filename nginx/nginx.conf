# Substitua SEU_DOMINIO_AQUI pelo domínio real antes de subir (ver DEPLOY.md).
# Antes do primeiro certbot rodar, comente o bloco 443/ssl e deixe só o 80
# fazendo proxy direto — depois de emitir o certificado, descomente.

server {
    listen 80;
    server_name SEU_DOMINIO_AQUI;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name SEU_DOMINIO_AQUI;

    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO_AQUI/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO_AQUI/privkey.pem;

    client_max_body_size 30m;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
